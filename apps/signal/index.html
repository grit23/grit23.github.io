<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-title" content="The Signal"> <!--shown under app icon on iphone-->
    <title>THE SIGNAL - Elite Focus: Decoy Protocol</title>
    
    <!-- Mobile App Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="conc_game_icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="conc_game_icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="conc_game_icon.png">
    
    
    <style>
        :root { --accent: #00ff95; --decoy: #ff0055; }
        body {
            margin: 0; background: #000; color: var(--accent);
            font-family: 'Courier New', monospace; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        #ui {
            position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between; z-index: 10;
        }
        .stat-box { background: rgba(255, 255, 255, 0.02); padding: 10px; border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; text-align: center;}
        canvas { border: 1px solid #111; cursor: none; background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #overlay {
            position: absolute; text-align: center; background: rgba(0, 0, 0, 0.98);
            padding: 50px; border: 2px solid var(--accent); z-index: 200; width: 450px;
        }
        .distraction {
            position: absolute; background: var(--decoy); color: white; padding: 10px 15px;
            font-size: 0.9rem; font-weight: bold; animation: pop 1s ease-out forwards; pointer-events: none; z-index: 100;
        }
        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
        #boss-alert {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--decoy); font-size: 3rem; font-weight: bold; text-shadow: 0 0 20px var(--decoy);
            display: none; z-index: 150; text-align: center; animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        button {
            background: var(--accent); color: #000; border: none; padding: 18px 45px;
            font-size: 1.3rem; cursor: pointer; font-family: inherit; font-weight: bold; margin-top: 30px; transition: 0.1s;
        }
        button:hover { background: white; transform: scale(1.05); }
        #stability-bar { width: 100%; height: 6px; background: var(--accent); transition: width 0.1s; }
        #cursor {
            width: 25px; height: 25px; border: 2px solid white; border-radius: 50%;
            position: fixed; pointer-events: none; transform: translate(-50%, -50%); z-index: 1000; transition: border-color 0.3s;
        }
    </style>
</head>
<body>

<div id="cursor"></div>
<div id="boss-alert">WARNING<br>DECOY PROTOCOL</div>

<div id="ui">
    <div class="stat-box">STABILITY<div style="width:160px; background:#111; margin-top:5px;"><div id="stability-bar"></div></div></div>
    <div class="stat-box">RANK<br><span id="rank" style="font-weight:bold;">NOVICE</span></div>
    <div class="stat-box">BEST: <span id="highscore">0</span><br>SCORE: <span id="score">0</span></div>
</div>

<div id="overlay">
    <h1 id="title">THE SIGNAL</h1>
    <p id="message">Fokusera på <span style="color:#00ff95">NEON</span>-signalen. Ignorera bruset. Uppnå eliten.</p>
    <button onclick="startGame()">INITIERA SEKVENSER</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const stabilityBar = document.getElementById('stability-bar');
    const scoreEl = document.getElementById('score');
    const highscoreEl = document.getElementById('highscore');
    const rankEl = document.getElementById('rank');
    const overlay = document.getElementById('overlay');
    const cursor = document.getElementById('cursor');
    const bossAlert = document.getElementById('boss-alert');

    let isPlaying = false, score = 0, stability = 100, time = 0, signalY = 225, mouseY = 0;
    let decoyY = 225; // Boss-variabel
    let isBossFight = false;
    let highscore = localStorage.getItem('signal_v3_score') || 0;
    let audioCtx, osc, gainNode;

    highscoreEl.innerText = highscore;
    canvas.width = Math.min(window.innerWidth * 0.9, 1000);
    canvas.height = 450;

    window.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouseY = e.clientY - rect.top;
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        osc = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        osc.type = 'triangle';
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        gainNode.gain.value = 0;
        osc.start();
    }

    function updateTheme() {
        if (score > 20000) { 
            if (!isBossFight) startBossFight();
        }
        else if (score > 15000) { document.documentElement.style.setProperty('--accent', '#ff00ff'); rankEl.innerText = "SENTINEL"; }
        else if (score > 8000) { document.documentElement.style.setProperty('--accent', '#00d4ff'); rankEl.innerText = "OPERATOR"; }
        else if (score > 3000) { document.documentElement.style.setProperty('--accent', '#f3ff00'); rankEl.innerText = "TECH"; }
    }

    function startBossFight() {
        isBossFight = true;
        document.documentElement.style.setProperty('--accent', '#00ff95'); // Reset accent to real signal
        rankEl.innerText = "HOSTILE";
        rankEl.style.color = "var(--decoy)";
        cursor.style.borderColor = "var(--decoy)";
        bossAlert.style.display = "block";
        setTimeout(() => bossAlert.style.display = "none", 2500);
    }

    function spawnDistraction() {
        if (!isPlaying || isBossFight) return; // Inga popups under bossen
        const div = document.createElement('div');
        div.className = 'distraction';
        div.innerText = ["NO", "FOCUS", "WAIT", "IGNORE"][Math.floor(Math.random()*4)];
        div.style.left = (Math.random()*80 + 10) + "vw"; div.style.top = (Math.random()*80 + 10) + "vh";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 1000);
        setTimeout(spawnDistraction, 2000 - (score/300)); 
    }

    function startGame() {
        if(!audioCtx) initAudio();
        score = 0; stability = 100; time = 0; isPlaying = true; isBossFight = false;
        document.documentElement.style.setProperty('--accent', '#00ff95');
        rankEl.style.color = "var(--accent)"; rankEl.innerText = "NOVICE";
        cursor.style.borderColor = "white";
        overlay.style.display = 'none';
        spawnDistraction();
        animate();
    }

    function drawSignal(yPosition, color, isMain) {
        ctx.strokeStyle = color;
        ctx.lineWidth = isMain ? 4 : 2;
        ctx.shadowBlur = isMain ? 15 : 5;
        ctx.shadowColor = color;
        ctx.beginPath();
        ctx.moveTo(0, yPosition);
        let freq = isMain ? 0.02 : 0.04;
        let amp = isMain ? 10 : 15;
        let speedMult = isMain ? 2 : 4;
        for(let x=0; x<canvas.width; x+=5) {
            ctx.lineTo(x, yPosition + Math.sin(x*freq + time*speedMult)*amp);
        }
        ctx.stroke();
        ctx.shadowBlur = 0; // Reset for next draw
    }

    function animate() {
        if (!isPlaying) return;
        updateTheme();

        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Huvudsignal Logik
        time += 0.03 + (score / 150000);
        let targetY = (canvas.height/2) + Math.sin(time)*110 + Math.cos(time*0.6)*60;
        signalY += (targetY - signalY) * 0.1;
        
        let mainColor = getComputedStyle(document.documentElement).getPropertyValue('--accent');
        drawSignal(signalY, mainColor, true);

        // Boss Logik (Decoy Signal)
        if (isBossFight) {
            let decoyTargetY = (canvas.height/2) + Math.sin(time*1.5)*150 + Math.cos(time*0.9)*30;
            decoyY += (decoyTargetY - decoyY) * 0.15; // Rör sig snabbare
            let decoyColor = getComputedStyle(document.documentElement).getPropertyValue('--decoy');
            drawSignal(decoyY, decoyColor, false);
        }

        // Check Focus
        const distMain = Math.abs(mouseY - signalY);
        const distDecoy = isBossFight ? Math.abs(mouseY - decoyY) : 999;

        if (distMain < 35) {
            score += 20;
            stability = Math.min(100, stability + 0.4);
            // Bra ljud
            gainNode.gain.setTargetAtTime(0.04, audioCtx.currentTime, 0.1);
            osc.frequency.setTargetAtTime(200 + (score/150), audioCtx.currentTime, 0.1);
            stabilityBar.style.background = mainColor;
        } else if (isBossFight && distDecoy < 35) {
            // Följer fel signal under boss
            stability -= 1.5; // Straffar hårt
            // Dåligt ljud (Boss)
            gainNode.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.05);
            osc.frequency.setTargetAtTime(90 + Math.random()*20, audioCtx.currentTime, 0.01);
            stabilityBar.style.background = "var(--decoy)";
        } else {
            // Tappat båda
            stability -= 0.7;
            // Dåligt ljud (Normal)
            gainNode.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.1);
            osc.frequency.setTargetAtTime(110, audioCtx.currentTime, 0.1);
            stabilityBar.style.background = "#fff";
        }

        stabilityBar.style.width = stability + "%";
        scoreEl.innerText = score;

        // Kritisk stabilitet (Blinkande skärm)
        if (stability < 25) {
            document.body.style.background = (Math.random() > 0.85) ? "#200" : "#000";
        } else {
            document.body.style.background = "#000";
        }

        if (stability <= 0) {
            isPlaying = false;
            gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            if (score > highscore) localStorage.setItem('signal_v3_score', score);
            document.getElementById('title').innerText = "SYSTEM FAILURE";
            document.getElementById('title').style.color = "var(--decoy)";
            document.getElementById('message').innerHTML = `Frekvensen förlorad vid <b>${score}</b> poäng.<br>Rank uppnådd: ${rankEl.innerText}`;
            overlay.style.display = 'block';
        } else {
            requestAnimationFrame(animate);
        }
    }
</script>
</body>
</html>
