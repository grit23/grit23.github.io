<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-title" content="The Signal"> <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        
    <link rel="apple-touch-icon" sizes="180x180" href="conc_game_icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="conc_game_icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="conc_game_icon.png">

    <title>THE SIGNAL - Elite Focus</title>
    <style>
        :root { --accent: #00ff95; --decoy: #ff0055; }
        
        /* Förhindrar alla system-gester och skroll på mobilen */
        * { 
            touch-action: none; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
            -webkit-user-select: none;
        }
        
        body {
            margin: 0; background: #000; color: var(--accent);
            font-family: 'Courier New', monospace; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }

        #ui {
            position: absolute; top: env(safe-area-inset-top, 20px); 
            width: 90%; display: flex; justify-content: space-between; z-index: 10;
            font-size: 12px;
        }

        .stat-box { background: rgba(255, 255, 255, 0.05); padding: 8px; border-radius: 4px; text-align: center; min-width: 80px; border: 1px solid rgba(255,255,255,0.1); }
        
        canvas { 
            display: block;
            background: #000; 
            touch-action: none;
        }

        #overlay {
            position: absolute; text-align: center; background: rgba(0, 0, 0, 0.95);
            padding: 30px; border: 2px solid var(--accent); z-index: 200; width: 80%; max-width: 400px;
        }

        #boss-alert {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: var(--decoy); font-size: 2rem; font-weight: bold;
            display: none; z-index: 150; text-align: center; animation: blink 0.4s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        button {
            background: var(--accent); color: #000; border: none; padding: 18px 40px;
            font-size: 1.2rem; cursor: pointer; font-family: inherit; font-weight: bold; margin-top: 25px;
            box-shadow: 0 0 15px var(--accent);
        }

        #stability-bar { width: 100%; height: 6px; background: var(--accent); transition: width 0.1s; }

        #cursor {
            width: 45px; height: 45px; border: 3px solid white; border-radius: 50%;
            position: fixed; pointer-events: none; transform: translate(-50%, -50%);
            z-index: 1000; will-change: transform, left, top;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

<div id="cursor"></div>
<div id="boss-alert">WARNING<br>DECOY PROTOCOL</div>

<div id="ui">
    <div class="stat-box">STABILITY<div style="width:100px; background:#111; margin-top:5px;"><div id="stability-bar"></div></div></div>
    <div class="stat-box">RANK<br><span id="rank" style="font-weight:bold;">NOVICE</span></div>
    <div class="stat-box">BEST: <span id="highscore">0</span><br>SCORE: <span id="score">0</span></div>
</div>

<div id="overlay">
    <h1 id="title">THE SIGNAL</h1>
    <p id="message">Synkronisera din blick.<br>Följ <span style="color:var(--accent)">NEON</span>-linjen.</p>
    <button id="startBtn">INITIERA</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const stabilityBar = document.getElementById('stability-bar');
    const scoreEl = document.getElementById('score');
    const highscoreEl = document.getElementById('highscore');
    const rankEl = document.getElementById('rank');
    const overlay = document.getElementById('overlay');
    const cursor = document.getElementById('cursor');
    const bossAlert = document.getElementById('boss-alert');
    const startBtn = document.getElementById('startBtn');

    let isPlaying = false, score = 0, stability = 100, time = 0, signalY = 200, mouseY = 0;
    let decoyY = 200, isBossFight = false;
    let highscore = localStorage.getItem('signal_final_score') || 0;
    let audioCtx, osc, gainNode;

    highscoreEl.innerText = highscore;
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.7;
        signalY = canvas.height / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // Responsiv positionering (Mus & Touch)
    function updatePos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        mouseY = clientY - rect.top;
        
        // Direkt uppdatering av markören utan CSS-delay
        cursor.style.left = clientX + 'px';
        cursor.style.top = clientY + 'px';
    }

    window.addEventListener('mousemove', (e) => updatePos(e.clientX, e.clientY));
    
    window.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) {
            updatePos(e.touches[0].clientX, e.touches[0].clientY);
        }
        if (isPlaying) e.preventDefault(); 
    }, { passive: false });

    window.addEventListener('touchstart', (e) => {
        if (e.touches.length > 0) {
            updatePos(e.touches[0].clientX, e.touches[0].clientY);
        }
    }, { passive: false });

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        osc = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        osc.type = 'triangle'; 
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        gainNode.gain.value = 0;
        osc.start();
    }

    function startGame() {
        initAudio();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        score = 0; stability = 100; time = 0; isPlaying = true; isBossFight = false;
        document.documentElement.style.setProperty('--accent', '#00ff95');
        rankEl.innerText = "NOVICE";
        rankEl.style.color = "var(--accent)";
        overlay.style.display = 'none';
        animate();
    }

    startBtn.addEventListener('click', startGame);

    function drawSignal(yPos, color, isMain) {
        ctx.strokeStyle = color;
        ctx.lineWidth = isMain ? 4 : 2;
        ctx.beginPath();
        ctx.moveTo(0, yPos);
        // Vågrörelsen (snabbare för bossen)
        for(let x=0; x < canvas.width; x += 10) {
            ctx.lineTo(x, yPos + Math.sin(x*0.02 + time*(isMain?2.5:4.5))* (isMain?20:30));
        }
        ctx.stroke();
    }

    function animate() {
        if (!isPlaying) return;

        // Triggervärde för Boss-fight
        if (score > 20000 && !isBossFight) {
            isBossFight = true;
            rankEl.innerText = "HOSTILE";
            rankEl.style.color = "var(--decoy)";
            bossAlert.style.display = "block";
            setTimeout(() => bossAlert.style.display = "none", 2500);
        } else if (score > 10000 && !isBossFight) {
            rankEl.innerText = "ELITE";
            document.documentElement.style.setProperty('--accent', '#00d4ff');
        }

        ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        time += 0.03 + (score / 250000); // Gradvis hastighetsökning
        let targetY = (canvas.height/2) + Math.sin(time)*90 + Math.cos(time*0.7)*50;
        signalY += (targetY - signalY) * 0.12;
        
        drawSignal(signalY, getComputedStyle(document.documentElement).getPropertyValue('--accent'), true);

        if (isBossFight) {
            let decoyTargetY = (canvas.height/2) + Math.sin(time*1.8)*140;
            decoyY += (decoyTargetY - decoyY) * 0.15;
            drawSignal(decoyY, getComputedStyle(document.documentElement).getPropertyValue('--decoy'), false);
        }

        const distMain = Math.abs(mouseY - signalY);
        const distDecoy = isBossFight ? Math.abs(mouseY - decoyY) : 999;

        if (distMain < 45) { // Träffyta för fingrar
            score += 25;
            stability = Math.min(100, stability + 0.5);
            gainNode.gain.setTargetAtTime(0.06, audioCtx.currentTime, 0.1);
            osc.frequency.setTargetAtTime(220 + (score/120), audioCtx.currentTime, 0.1);
            stabilityBar.style.background = "var(--accent)";
        } else {
            // Felstraff (Bossen straffar hårdare)
            stability -= (isBossFight && distDecoy < 45) ? 1.8 : 0.8;
            gainNode.gain.setTargetAtTime(0.15, audioCtx.currentTime, 0.1);
            osc.frequency.setTargetAtTime(120, audioCtx.currentTime, 0.05);
            stabilityBar.style.background = "#fff";
        }

        stabilityBar.style.width = stability + "%";
        scoreEl.innerText = score;

        if (stability <= 0) {
            isPlaying = false;
            gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            if (score > highscore) {
                highscore = score;
                localStorage.setItem('signal_final_score', highscore);
                highscoreEl.innerText = highscore;
            }
            overlay.style.display = 'block';
            document.getElementById('title').innerText = "DISCONNECTED";
            document.getElementById('message').innerHTML = `Poäng: ${score}<br>Rank: ${rankEl.innerText}`;
        } else {
            requestAnimationFrame(animate);
        }
    }
</script>
</body>
</html>
